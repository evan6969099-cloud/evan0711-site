<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>evan0711.dpdns.org</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 40px));
        padding: 48px;
        border: 1px solid #d9e0eb;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 48px rgba(23, 32, 51, 0.08);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 5vw, 56px);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #526174;
        font-size: 18px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>evan0711.dpdns.org</h1>
      <p>This site is deployed with GitHub Pages.</p>
    </main>
  </body>
</html>
